<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinyl Record Tracker</title>
  <style>
    :root {
      --cream-1: #f6efe4;
      --cream-2: #efe3d0;
      --brown-1: #2a1f16;
      --brown-2: #4a3526;
      --brown-3: #6d4a34;
      --gold: #b88545;
      --rust: #8f4e2d;
      --ink: #20170f;
      --card: #fff9f0;
      --muted: #7a6252;
      --danger: #8a2f2f;
      --shadow: 0 10px 30px rgba(32, 23, 15, 0.18);
      --radius: 14px;
      --radius-sm: 10px;
      --transition: 170ms ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1300px 700px at 15% -10%, rgba(184, 133, 69, 0.2), transparent 65%),
        radial-gradient(1000px 600px at 105% 0%, rgba(143, 78, 45, 0.18), transparent 60%),
        linear-gradient(180deg, var(--cream-1), var(--cream-2));
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.12;
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(74, 53, 38, 0.14) 0,
          rgba(74, 53, 38, 0.14) 2px,
          transparent 2px,
          transparent 8px
        );
      mix-blend-mode: multiply;
    }

    .container {
      width: min(1200px, 96vw);
      margin: 20px auto 32px;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      background: linear-gradient(140deg, #fdf8ef, #f2e6d6);
      border: 1px solid rgba(74, 53, 38, 0.2);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .title-wrap {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      letter-spacing: 0.5px;
      font-size: clamp(1.3rem, 2.5vw, 2rem);
      color: var(--brown-1);
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .stat {
      background: #fffaf2;
      border: 1px solid rgba(74, 53, 38, 0.2);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      text-align: center;
    }

    .stat .label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat .value {
      display: block;
      font-size: 1.5rem;
      color: var(--brown-2);
      font-weight: 700;
      margin-top: 2px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 12px 0;
    }

    .tab-btn {
      border: 1px solid rgba(74, 53, 38, 0.35);
      background: #f8eddd;
      color: var(--brown-2);
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), color var(--transition);
    }

    .tab-btn:hover {
      transform: translateY(-1px);
      background: #f1debf;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--brown-2), var(--brown-3));
      color: #fff7ed;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .search {
      width: 100%;
      border: 1px solid rgba(74, 53, 38, 0.25);
      border-radius: 999px;
      padding: 11px 14px;
      background: #fffaf2;
      color: var(--ink);
      font-size: 0.95rem;
    }

    .search:focus,
    input:focus,
    textarea:focus,
    select:focus,
    button:focus {
      outline: 2px solid rgba(184, 133, 69, 0.35);
      outline-offset: 1px;
    }

    .card {
      background: linear-gradient(140deg, #fffaf2, #fff4e4);
      border: 1px solid rgba(74, 53, 38, 0.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid rgba(74, 53, 38, 0.25);
      background: #fffcf7;
      border-radius: 8px;
      padding: 10px;
      font: inherit;
      color: var(--ink);
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .art-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .button,
    .fetch-btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: linear-gradient(145deg, var(--rust), var(--brown-3));
      color: #fff8ec;
      cursor: pointer;
      font-weight: 600;
      transition: transform var(--transition), filter var(--transition);
    }

    .button:hover,
    .fetch-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }

    .button.secondary {
      background: linear-gradient(145deg, #a67a49, #875b37);
    }

    .button.delete {
      background: linear-gradient(145deg, #8a2f2f, #6f1e1e);
    }

    .preview {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(74, 53, 38, 0.25);
      background: #f5e7d4;
      display: none;
    }

    .records-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .record-card {
      background: #fffaf0;
      border: 1px solid rgba(74, 53, 38, 0.22);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      animation: slideIn 260ms ease;
    }

    @keyframes slideIn {
      from {
        transform: translateY(6px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .record-art {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background:
        radial-gradient(circle at 50% 50%, rgba(74, 53, 38, 0.18), rgba(32, 23, 15, 0.5)),
        linear-gradient(145deg, #7a6252, #3a2b20);
    }

    .record-body {
      padding: 10px;
      display: grid;
      gap: 8px;
      flex: 1;
    }

    .record-title {
      margin: 0;
      line-height: 1.2;
      font-size: 1.02rem;
      color: var(--brown-1);
    }

    .record-meta {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      min-height: 1.15rem;
    }

    .record-notes {
      margin: 0;
      font-size: 0.9rem;
      color: #36271d;
      background: rgba(184, 133, 69, 0.12);
      border-left: 3px solid rgba(143, 78, 45, 0.65);
      padding: 7px;
      border-radius: 6px;
      min-height: 40px;
      white-space: pre-wrap;
    }

    .record-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .record-actions select {
      border: 1px solid rgba(74, 53, 38, 0.26);
      border-radius: 8px;
      padding: 8px;
      background: #fffdf8;
      color: var(--ink);
    }

    .empty {
      margin: 10px 0 0;
      color: var(--muted);
      font-style: italic;
    }

    .status {
      margin: 8px 0 0;
      min-height: 1.2rem;
      color: var(--brown-2);
      font-size: 0.9rem;
    }

    @media (max-width: 780px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .records-grid {
        grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="top-bar">
      <div class="title-wrap">
        <div>
          <h1>Vinyl Record Tracker</h1>
          <p class="subtitle">Keep your crate organized while you browse the bins.</p>
        </div>
      </div>
      <div class="stats" aria-label="Collection stats">
        <div class="stat">
          <span class="label">Total Owned</span>
          <span class="value" id="stat-owned">0</span>
        </div>
        <div class="stat">
          <span class="label">Wish List</span>
          <span class="value" id="stat-wishlist">0</span>
        </div>
        <div class="stat">
          <span class="label">To Give Away</span>
          <span class="value" id="stat-giveaway">0</span>
        </div>
      </div>
    </section>

    <nav class="tabs" aria-label="Record sections">
      <button class="tab-btn active" data-section="collection">My Collection</button>
      <button class="tab-btn" data-section="wishlist">Wish List</button>
      <button class="tab-btn" data-section="giveaway">To Give Away</button>
    </nav>

    <div class="controls">
      <input class="search" id="search" type="search" placeholder="Search by artist or album title" aria-label="Search records" />
    </div>

    <section class="card" aria-labelledby="add-record-title">
      <h2 id="add-record-title" style="margin-top:0; margin-bottom: 10px; color: var(--brown-1);">Add a Record</h2>
      <form id="record-form">
        <div class="form-grid">
          <div class="field">
            <label for="artist">Artist *</label>
            <input id="artist" name="artist" required placeholder="Miles Davis" />
          </div>

          <div class="field">
            <label for="title">Album Title *</label>
            <input id="title" name="title" required placeholder="Kind of Blue" />
          </div>

          <div class="field">
            <label for="year">Year</label>
            <input id="year" name="year" placeholder="1959" inputmode="numeric" />
          </div>

          <div class="field">
            <label for="genre">Genre</label>
            <input id="genre" name="genre" placeholder="Jazz" />
          </div>

          <div class="field full">
            <label for="notes">Personal Notes</label>
            <textarea id="notes" name="notes" placeholder="Dad's favorite"></textarea>
          </div>

          <div class="field">
            <label for="section">Section</label>
            <select id="section" name="section">
              <option value="collection">My Collection</option>
              <option value="wishlist">Wish List</option>
              <option value="giveaway">To Give Away</option>
            </select>
          </div>

          <div class="field">
            <label for="artUpload">Album Art Upload</label>
            <input id="artUpload" type="file" accept="image/*" />
          </div>

          <div class="field full">
            <label for="artUrl">Album Art URL (optional)</label>
            <div class="art-row">
              <input id="artUrl" name="artUrl" placeholder="https://..." />
              <button id="fetch-art" class="fetch-btn" type="button">Fetch Art</button>
            </div>
          </div>

          <div class="field full" style="display:flex; align-items:center; gap:12px;">
            <img id="art-preview" class="preview" alt="Album art preview" />
            <div>
              <button class="button" type="submit">Add Record</button>
              <div class="status" id="status" role="status" aria-live="polite"></div>
            </div>
          </div>
        </div>
      </form>
    </section>

    <section class="card">
      <h2 style="margin-top:0; margin-bottom: 10px; color: var(--brown-1);" id="current-heading">My Collection</h2>
      <div id="records" class="records-grid"></div>
      <p id="empty" class="empty" hidden>No records found in this section.</p>
    </section>
  </div>

  <template id="record-template">
    <article class="record-card">
      <img class="record-art" alt="Album art" />
      <div class="record-body">
        <h3 class="record-title"></h3>
        <p class="record-meta"></p>
        <p class="record-notes"></p>
        <div class="record-actions">
          <select class="move-select" aria-label="Move record section">
            <option value="collection">My Collection</option>
            <option value="wishlist">Wish List</option>
            <option value="giveaway">To Give Away</option>
          </select>
          <button class="button delete" type="button">Delete</button>
        </div>
      </div>
    </article>
  </template>

  <script>
    (function () {
      const STORAGE_KEY = "vinyl-record-tracker.v1";
      const tabs = Array.from(document.querySelectorAll(".tab-btn"));
      const form = document.getElementById("record-form");
      const searchInput = document.getElementById("search");
      const recordsEl = document.getElementById("records");
      const emptyEl = document.getElementById("empty");
      const headingEl = document.getElementById("current-heading");
      const template = document.getElementById("record-template");
      const statusEl = document.getElementById("status");
      const artUploadEl = document.getElementById("artUpload");
      const artUrlEl = document.getElementById("artUrl");
      const artPreviewEl = document.getElementById("art-preview");
      const fetchArtBtn = document.getElementById("fetch-art");

      const statOwnedEl = document.getElementById("stat-owned");
      const statWishlistEl = document.getElementById("stat-wishlist");
      const statGiveawayEl = document.getElementById("stat-giveaway");

      let records = [];
      let activeSection = "collection";
      let uploadedArtDataUrl = "";

      const sectionLabel = {
        collection: "My Collection",
        wishlist: "Wish List",
        giveaway: "To Give Away"
      };

      function setStatus(message, isError) {
        statusEl.textContent = message || "";
        statusEl.style.color = isError ? "#8a2f2f" : "#4a3526";
      }

      function loadRecords() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          records = raw ? JSON.parse(raw) : [];
        } catch (err) {
          records = [];
          setStatus("Saved data was invalid and has been reset.", true);
        }
      }

      function saveRecords() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      }

      function updateStats() {
        const owned = records.filter((r) => r.section === "collection").length;
        const wishlist = records.filter((r) => r.section === "wishlist").length;
        const giveaway = records.filter((r) => r.section === "giveaway").length;
        statOwnedEl.textContent = String(owned);
        statWishlistEl.textContent = String(wishlist);
        statGiveawayEl.textContent = String(giveaway);
      }

      function getFilteredRecords() {
        const q = searchInput.value.trim().toLowerCase();
        return records.filter((record) => {
          if (record.section !== activeSection) {
            return false;
          }
          if (!q) {
            return true;
          }
          return (
            record.artist.toLowerCase().includes(q) ||
            record.title.toLowerCase().includes(q)
          );
        });
      }

      function recordMetaText(record) {
        const parts = [];
        if (record.year) parts.push(record.year);
        if (record.genre) parts.push(record.genre);
        return parts.join(" • ");
      }

      function render() {
        tabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.section === activeSection));
        headingEl.textContent = sectionLabel[activeSection];

        const data = getFilteredRecords();
        recordsEl.innerHTML = "";

        if (!data.length) {
          emptyEl.hidden = false;
          return;
        }

        emptyEl.hidden = true;

        data.forEach((record) => {
          const fragment = template.content.cloneNode(true);
          const card = fragment.querySelector(".record-card");
          const art = fragment.querySelector(".record-art");
          const title = fragment.querySelector(".record-title");
          const meta = fragment.querySelector(".record-meta");
          const notes = fragment.querySelector(".record-notes");
          const moveSelect = fragment.querySelector(".move-select");
          const deleteBtn = fragment.querySelector(".delete");

          title.textContent = record.artist + " - " + record.title;
          meta.textContent = recordMetaText(record) || "No year/genre";
          notes.textContent = record.notes || "No notes";

          if (record.art) {
            art.src = record.art;
          } else {
            art.removeAttribute("src");
          }

          moveSelect.value = record.section;
          moveSelect.addEventListener("change", () => {
            record.section = moveSelect.value;
            saveRecords();
            updateStats();
            render();
          });

          deleteBtn.addEventListener("click", () => {
            records = records.filter((r) => r.id !== record.id);
            saveRecords();
            updateStats();
            render();
          });

          card.dataset.id = record.id;
          recordsEl.appendChild(fragment);
        });
      }

      function resetArtPreview() {
        artPreviewEl.removeAttribute("src");
        artPreviewEl.style.display = "none";
        uploadedArtDataUrl = "";
      }

      function setArtPreview(src) {
        if (!src) {
          resetArtPreview();
          return;
        }
        artPreviewEl.src = src;
        artPreviewEl.style.display = "block";
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("Unable to read image file."));
          reader.readAsDataURL(file);
        });
      }

      async function fetchArt(artist, album) {
        const term = encodeURIComponent((artist + " " + album).trim());
        const url = "https://itunes.apple.com/search?media=music&entity=album&limit=1&term=" + term;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("iTunes API request failed.");
        }

        const payload = await response.json();
        const first = payload.results && payload.results[0];
        if (!first || !first.artworkUrl100) {
          return "";
        }

        // Use higher-resolution art when available.
        return first.artworkUrl100.replace("100x100bb", "600x600bb");
      }

      tabs.forEach((btn) => {
        btn.addEventListener("click", () => {
          activeSection = btn.dataset.section;
          render();
        });
      });

      searchInput.addEventListener("input", render);

      artUploadEl.addEventListener("change", async () => {
        const file = artUploadEl.files && artUploadEl.files[0];
        if (!file) {
          resetArtPreview();
          return;
        }

        try {
          uploadedArtDataUrl = await readFileAsDataUrl(file);
          setArtPreview(uploadedArtDataUrl);
          setStatus("Artwork uploaded.");
        } catch (err) {
          resetArtPreview();
          setStatus("Could not read uploaded artwork.", true);
        }
      });

      fetchArtBtn.addEventListener("click", async () => {
        const artist = form.artist.value.trim();
        const title = form.title.value.trim();

        if (!artist || !title) {
          setStatus("Enter artist and album title first to fetch art.", true);
          return;
        }

        fetchArtBtn.disabled = true;
        fetchArtBtn.textContent = "Fetching...";
        setStatus("Looking up album art from iTunes...");

        try {
          const art = await fetchArt(artist, title);
          if (!art) {
            setStatus("No matching album art found.", true);
            return;
          }

          artUrlEl.value = art;
          uploadedArtDataUrl = "";
          artUploadEl.value = "";
          setArtPreview(art);
          setStatus("Album art fetched from iTunes.");
        } catch (err) {
          setStatus("Unable to fetch artwork right now.", true);
        } finally {
          fetchArtBtn.disabled = false;
          fetchArtBtn.textContent = "Fetch Art";
        }
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const artist = form.artist.value.trim();
        const title = form.title.value.trim();
        if (!artist || !title) {
          setStatus("Artist and album title are required.", true);
          return;
        }

        const art = uploadedArtDataUrl || artUrlEl.value.trim();
        const record = {
          id: crypto.randomUUID(),
          artist,
          title,
          year: form.year.value.trim(),
          genre: form.genre.value.trim(),
          notes: form.notes.value.trim(),
          art,
          section: form.section.value
        };

        records.unshift(record);
        saveRecords();
        updateStats();

        form.reset();
        resetArtPreview();
        setStatus("Record added.");

        activeSection = record.section;
        render();
      });

      loadRecords();
      updateStats();
      render();
    })();
  </script>
</body>
</html>
